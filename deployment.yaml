apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-dashboard
  namespace: incident-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-dashboard
  template:
    metadata:
      labels:
        app: incident-dashboard
    spec:
      containers:
        - name: incident-dashboard
          image: incidentdashboard.azurecr.io/incident-dashboard:16
          ports:
            - containerPort: 80
          env:
            - name: APP_VERSION
              value: "v16"
